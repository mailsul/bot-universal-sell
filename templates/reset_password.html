{% extends "base.html" %}
{% block title %}Reset Password — {{ cfg.nama_toko }}{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5 col-lg-4">
    <div class="text-center mb-4">
      <div class="auth-icon-wrap">
        <i class="bi bi-shield-lock-fill text-brand"></i>
      </div>
      <h4 class="fw-bold mb-0">Reset Password</h4>
      <p class="small" style="color:var(--text-muted)">Masukkan OTP dari Telegram dan password baru kamu</p>
    </div>

    <div class="card">
      <div class="card-body p-4">
        <form method="post" action="/reset-password">
          <input type="hidden" name="_csrf" value="{{ csrf_token() }}">

          <div class="mb-3">
            <label class="form-label"><i class="bi bi-shield-check me-1 text-brand"></i>Kode OTP (dari Telegram)</label>
            <input type="text" name="otp"
              class="form-control fw-bold text-center"
              style="font-size:1.5rem;letter-spacing:6px"
              placeholder="000000"
              maxlength="6" pattern="\d{6}" inputmode="numeric"
              autocomplete="one-time-code" required autofocus>
          </div>

          <div class="mb-3">
            <label class="form-label"><i class="bi bi-lock me-1 text-brand"></i>Password Baru</label>
            <div class="input-group">
              <input type="password" name="password" id="pw1" class="form-control"
                placeholder="Min 8 karakter" required minlength="8">
              <button type="button" class="btn btn-outline-secondary border-start-0"
                style="border-radius:0 10px 10px 0;background:var(--brand-light);border-color:var(--border)"
                onclick="var p=document.getElementById('pw1');p.type=p.type==='password'?'text':'password'">
                <i class="bi bi-eye"></i>
              </button>
            </div>
            <div class="form-text">Min 8 karakter, huruf kapital, angka, dan simbol</div>
          </div>

          <div class="mb-4">
            <label class="form-label"><i class="bi bi-lock-fill me-1 text-brand"></i>Konfirmasi Password</label>
            <input type="password" name="password2" class="form-control"
              placeholder="Ulangi password baru" required>
          </div>

          <button type="submit" class="btn btn-brand w-100 py-2 fw-semibold">
            <i class="bi bi-check-circle me-1"></i>Reset Password
          </button>
        </form>

        <hr class="my-3">
        <p class="text-center mb-0 small" style="color:var(--text-muted)">
          OTP tidak datang?
          <a href="/forgot-password" class="text-brand fw-semibold text-decoration-none">Kirim ulang OTP</a>
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
