{% extends "base.html" %}
{% block title %}Daftar — {{ cfg.nama_toko }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5 col-lg-4">
    <div class="card">
      <div class="card-header text-center py-3">
        <h5 class="mb-0"><i class="bi bi-person-plus"></i> Buat Akun</h5>
      </div>
      <div class="card-body p-4">

        <div class="alert alert-info small mb-3">
          <i class="bi bi-telegram me-1"></i>
          <strong>Penting:</strong> Kamu harus sudah <a href="https://t.me/{{ cfg.kontak_admin | replace('@','') }}" target="_blank">/start bot kami</a> di Telegram sebelum mendaftar — OTP akan dikirim ke sana.
        </div>

        <form method="post" action="/register">
          <div class="mb-3">
            <label class="form-label fw-semibold">Telegram ID</label>
            <input type="number" name="telegram_id" class="form-control" placeholder="Contoh: 1234567890" required>
            <div class="form-text">Cari Telegram ID kamu via <a href="https://t.me/userinfobot" target="_blank">@userinfobot</a></div>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Password</label>
            <input type="password" name="password" class="form-control" placeholder="Minimal 6 karakter" required minlength="6">
          </div>
          <div class="mb-4">
            <label class="form-label fw-semibold">Konfirmasi Password</label>
            <input type="password" name="password2" class="form-control" placeholder="Ulangi password" required>
          </div>
          <button type="submit" class="btn btn-brand w-100 py-2 fw-semibold">
            <i class="bi bi-send"></i> Kirim OTP ke Telegram
          </button>
        </form>
        <hr>
        <p class="text-center mb-0 small">Sudah punya akun? <a href="/login" class="fw-bold">Login</a></p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
