{% extends "base.html" %}
{% block title %}Verifikasi OTP — {{ cfg.nama_toko }}{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5 col-lg-4">
    <div class="text-center mb-4">
      <div class="auth-icon-wrap" style="background:#eff6ff">
        <i class="bi bi-shield-check" style="color:#3b82f6;font-size:1.7rem"></i>
      </div>
      <h4 class="fw-bold mb-0">Cek Telegram Kamu</h4>
      <p class="small" style="color:var(--text-muted)">Masukkan kode OTP 6 digit yang dikirim bot</p>
    </div>
    <div class="card">
      <div class="card-body p-4 text-center">
        <form method="post" action="/verify">
          <input type="hidden" name="_csrf" value="{{ csrf_token() }}">
          <div class="mb-4">
            <input type="text" name="otp"
              class="form-control form-control-lg text-center fw-bold"
              style="font-size:2rem;letter-spacing:8px;border-radius:12px"
              placeholder="000000"
              maxlength="6"
              pattern="\d{6}"
              inputmode="numeric"
              autocomplete="one-time-code"
              required autofocus>
          </div>
          <button type="submit" class="btn btn-brand w-100 py-2 fw-semibold mb-3">
            <i class="bi bi-check-circle me-1"></i>Verifikasi &amp; Buat Akun
          </button>
        </form>
        <small style="color:var(--text-muted)">
          OTP tidak datang? Pastikan bot tidak diblokir, lalu
          <a href="/register" class="text-brand fw-semibold text-decoration-none">coba daftar ulang</a>.
        </small>
      </div>
    </div>
  </div>
</div>
{% endblock %}
