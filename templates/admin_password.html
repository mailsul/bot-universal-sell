{% extends "base.html" %}
{% block title %}Ganti Password — {{ cfg.nama_toko }}{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5 col-lg-4">
    <div class="text-center mb-4">
      <div style="width:56px;height:56px;background:var(--brand-light);border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;font-size:1.6rem;">
        <i class="bi bi-key-fill text-brand"></i>
      </div>
      <h4 class="fw-bold mb-0">Ganti Password Admin</h4>
    </div>
    <div class="card">
      <div class="card-body p-4">
        <form method="post" action="/admin/password">
          <div class="mb-3">
            <label class="form-label">Password Lama</label>
            <input type="password" name="current_password" class="form-control" required autofocus>
          </div>
          <div class="mb-3">
            <label class="form-label">Password Baru</label>
            <input type="password" name="new_password" class="form-control" minlength="6" required>
          </div>
          <div class="mb-4">
            <label class="form-label">Konfirmasi Password Baru</label>
            <input type="password" name="new_password2" class="form-control" minlength="6" required>
          </div>
          <button type="submit" class="btn btn-brand w-100 py-2 fw-semibold">
            <i class="bi bi-check-circle me-1"></i>Simpan Password Baru
          </button>
        </form>
        <div class="text-center mt-3">
          <a href="/admin" class="text-muted small text-decoration-none">
            <i class="bi bi-arrow-left me-1"></i>Kembali ke Admin
          </a>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
