{% extends "base.html" %}
{% block title %}Ganti Password — {{ cfg.nama_toko }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5 col-lg-4">
    <div class="card">
      <div class="card-header text-center py-3">
        <h5 class="mb-0"><i class="bi bi-key"></i> Ganti Password Admin</h5>
      </div>
      <div class="card-body p-4">
        <form method="post" action="/admin/password">
          <div class="mb-3">
            <label class="form-label fw-semibold">Password Lama</label>
            <input type="password" name="current_password" class="form-control" required>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Password Baru</label>
            <input type="password" name="new_password" class="form-control" minlength="6" required>
          </div>
          <div class="mb-4">
            <label class="form-label fw-semibold">Konfirmasi Password Baru</label>
            <input type="password" name="new_password2" class="form-control" minlength="6" required>
          </div>
          <button type="submit" class="btn btn-brand w-100 py-2 fw-semibold">
            <i class="bi bi-check-circle"></i> Simpan Password Baru
          </button>
        </form>
        <div class="text-center mt-3">
          <a href="/admin" class="text-muted small"><i class="bi bi-arrow-left"></i> Kembali ke Admin</a>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
