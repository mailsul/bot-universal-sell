<!DOCTYPE html>
<html lang="id" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maintenance — {{ cfg.nama_toko }}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    body { background: #f8fafc; min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Inter', sans-serif; }
    .maintenance-card { background: #fff; border-radius: 20px; padding: 3rem; box-shadow: 0 8px 40px rgba(0,0,0,.08); max-width: 420px; width: 100%; text-align: center; }
    .icon-wrap { background: #fffbeb; border-radius: 50%; width: 90px; height: 90px; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem; }
  </style>
</head>
<body>
  <div class="maintenance-card">
    <div class="icon-wrap">
      <i class="bi bi-tools" style="font-size:2.5rem;color:#f59e0b"></i>
    </div>
    <h4 class="fw-bold mb-2">Sedang Maintenance</h4>
    <p class="text-muted mb-4">Toko <strong>{{ cfg.nama_toko }}</strong> sedang dalam pemeliharaan sementara. Silakan coba beberapa saat lagi.</p>
    {% if cfg.kontak_admin %}
    <a href="https://t.me/{{ cfg.kontak_admin | replace('@','') }}" target="_blank" class="btn btn-warning fw-semibold">
      <i class="bi bi-telegram me-1"></i>Hubungi Admin
    </a>
    {% endif %}
    <div class="mt-4 text-muted small">
      <i class="bi bi-clock me-1"></i>Refresh halaman ini untuk mencoba kembali
    </div>
  </div>
</body>
</html>
