{% extends "base.html" %}
{% block title %}Lupa Password — {{ cfg.nama_toko }}{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5 col-lg-4">
    <div class="text-center mb-4">
      <div class="auth-icon-wrap">
        <i class="bi bi-key-fill text-brand"></i>
      </div>
      <h4 class="fw-bold mb-0">Lupa Password?</h4>
      <p class="small" style="color:var(--text-muted)">Masukkan email atau nomor HP untuk menerima OTP reset</p>
    </div>

    <div class="card">
      <div class="card-body p-4">
        <form method="post" action="/forgot-password">
          <input type="hidden" name="_csrf" value="{{ csrf_token() }}">

          <div class="mb-4">
            <label class="form-label"><i class="bi bi-person me-1 text-brand"></i>Email / Nomor HP</label>
            <input type="text" name="identifier" class="form-control"
              placeholder="email@gmail.com atau +62812…" required autofocus>
            <div class="form-text">OTP akan dikirim ke Telegram yang terhubung dengan akun ini</div>
          </div>

          <button type="submit" class="btn btn-brand w-100 py-2 fw-semibold">
            <i class="bi bi-send me-1"></i>Kirim OTP Reset
          </button>
        </form>

        <hr class="my-3">
        <p class="text-center mb-0 small" style="color:var(--text-muted)">
          <a href="/login" class="fw-semibold text-brand text-decoration-none">
            <i class="bi bi-arrow-left me-1"></i>Kembali ke Login
          </a>
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
