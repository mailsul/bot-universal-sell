{% extends "base.html" %}
{% block title %}Login — {{ cfg.nama_toko }}{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5 col-lg-4">
    <div class="text-center mb-4">
      <div style="width:56px;height:56px;background:var(--brand-light);border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;font-size:1.6rem;">
        <i class="bi bi-box-arrow-in-right text-brand"></i>
      </div>
      <h4 class="fw-bold mb-0">Masuk ke Akun</h4>
      <p class="text-muted small">{{ cfg.nama_toko }}</p>
    </div>
    <div class="card">
      <div class="card-body p-4">
        <form method="post" action="/login">
          <div class="mb-3">
            <label class="form-label">Telegram ID</label>
            <input type="number" name="telegram_id" class="form-control" placeholder="1234567890" required autofocus>
            <div class="form-text">Cek via <a href="https://t.me/userinfobot" target="_blank">@userinfobot</a></div>
          </div>
          <div class="mb-4">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-control" placeholder="Password kamu" required>
          </div>
          <button type="submit" class="btn btn-brand w-100 py-2 fw-semibold">
            <i class="bi bi-box-arrow-in-right me-1"></i>Masuk
          </button>
        </form>
        <hr class="my-3">
        <p class="text-center mb-0 small text-muted">
          Belum punya akun? <a href="/register" class="fw-semibold text-brand text-decoration-none">Daftar sekarang</a>
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
