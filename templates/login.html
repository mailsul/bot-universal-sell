{% extends "base.html" %}
{% block title %}Login — {{ cfg.nama_toko }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5 col-lg-4">
    <div class="card">
      <div class="card-header text-center py-3">
        <h5 class="mb-0"><i class="bi bi-box-arrow-in-right"></i> Login</h5>
      </div>
      <div class="card-body p-4">
        <form method="post" action="/login">
          <div class="mb-3">
            <label class="form-label fw-semibold">Telegram ID</label>
            <input type="number" name="telegram_id" class="form-control" placeholder="Contoh: 1234567890" required>
            <div class="form-text">Cari Telegram ID kamu via bot <a href="https://t.me/userinfobot" target="_blank">@userinfobot</a></div>
          </div>
          <div class="mb-4">
            <label class="form-label fw-semibold">Password</label>
            <input type="password" name="password" class="form-control" placeholder="Password" required>
          </div>
          <button type="submit" class="btn btn-brand w-100 py-2 fw-semibold">
            <i class="bi bi-box-arrow-in-right"></i> Masuk
          </button>
        </form>
        <hr>
        <p class="text-center mb-0 small">Belum punya akun? <a href="/register" class="fw-bold">Daftar sekarang</a></p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
