{% extends "base.html" %}
{% block title %}Verifikasi Admin — {{ cfg.nama_toko }}{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5 col-lg-4">
    <div class="card shadow-sm border-0 rounded-4 p-2">
      <div class="card-body p-4">
        <div class="text-center mb-4">
          <div style="background:#ede9fe;border-radius:50%;width:70px;height:70px;display:flex;align-items:center;justify-content:center;margin:0 auto 1rem">
            <i class="bi bi-shield-lock-fill text-brand" style="font-size:2rem"></i>
          </div>
          <h5 class="fw-bold mb-1">Verifikasi Admin</h5>
          <p class="text-muted small mb-0">Masukkan kode OTP yang dikirim ke Telegram kamu</p>
        </div>

        <form method="POST" action="/admin/2fa">
          <input type="hidden" name="_csrf" value="{{ csrf_token() }}">
          <div class="mb-3">
            <label class="form-label fw-semibold">Kode OTP <span class="text-danger">*</span></label>
            <input type="text" name="otp" class="form-control form-control-lg text-center fw-bold letter-spacing-2"
                   maxlength="6" inputmode="numeric" pattern="[0-9]{6}" autocomplete="one-time-code"
                   placeholder="● ● ● ● ● ●" required autofocus>
            <div class="form-text text-center">OTP berlaku 10 menit</div>
          </div>
          <button type="submit" class="btn btn-brand w-100 fw-semibold py-2">
            <i class="bi bi-shield-check me-2"></i>Verifikasi
          </button>
        </form>

        <div class="text-center mt-3">
          <a href="/login" class="text-muted small"><i class="bi bi-arrow-left me-1"></i>Kembali ke Login</a>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
